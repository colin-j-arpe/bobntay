[tool.ruff]
target-version = "py312"
line-length = 100
# Lint project source only — skip migrations and the virtualenv
exclude = [
    "bnt_env",
    "*/migrations/*.py",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (undefined names, unused imports, etc.)
    "I",   # isort (import ordering)
    "UP",  # pyupgrade (modernise syntax for target Python version)
    "DJ",  # flake8-django (Django-specific checks)
]

[tool.ruff.format]
# Ruff's formatter is Black-compatible by default — no extra config needed.
